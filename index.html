<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MisGastos v2</title>
<style>
/* Estilos mantenidos igual para consistencia */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f0eef8;--white:#ffffff;--purple:#6c5ce7;--purple-light:#ede9ff;--text:#1a1a2e;--text2:#6b6b8a;--text3:#aaaacc;--green:#2ecc71;--red:#e74c3c;--amber:#f39c12;--shadow:0 2px 12px rgba(108,92,231,0.10);--shadow-card:0 4px 20px rgba(108,92,231,0.08);--radius:18px;--radius-sm:12px;--bottom-nav:68px}
html,body{height:100%;width:100%;background:var(--bg);font-family:'Segoe UI',sans-serif;color:var(--text);overflow:hidden;font-size:15px}
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg)}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:0 0 calc(var(--bottom-nav) + 16px) 0;display:none}
.page.active{display:block}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--bottom-nav);background:var(--white);border-top:1px solid rgba(108,92,231,0.1);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;background:none;border:none;color:var(--text3);font-size:11px;font-weight:500}
.nav-item.active{color:var(--purple)}
.nav-icon{font-size:22px;line-height:1}
.page-header{padding:52px 20px 16px;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:22px;font-weight:700}
.summary-hero{background:var(--purple);border-radius:var(--radius);padding:22px 20px;margin:8px 16px 12px;color:#fff}
.summary-hero .amount{font-size:36px;font-weight:700}
.summary-row{display:flex;gap:10px;margin:0 16px 12px}
.summary-mini{flex:1;background:var(--white);border-radius:var(--radius-sm);padding:14px;box-shadow:var(--shadow-card)}
.val{font-size:18px;font-weight:700}
.val.green{color:var(--green)}.val.red{color:var(--red)}
.fab{position:fixed;bottom:calc(var(--bottom-nav) + 16px);right:calc(50% - 200px);width:54px;height:54px;border-radius:50%;background:var(--purple);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;z-index:99}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:430px}
.form-group{margin-bottom:14px}
.form-group input,.form-group select{width:100%;padding:13px 14px;background:var(--bg);border-radius:var(--radius-sm);outline:none}
.btn-primary{width:100%;padding:15px;border-radius:var(--radius-sm);background:var(--purple);border:none;color:#fff;font-weight:700}
</style>
</head>
<body>
<div id="app">
  <div class="pages">
    <!-- Resumen -->
    <div class="page active" id="page-resumen">
      <div class="summary-hero">
        <div style="opacity:0.8;font-size:12px">Total Gastado</div>
        <div class="amount" id="res-total">RD$ 0</div>
      </div>
      <div class="summary-row">
        <div class="summary-mini">
            <div style="font-size:11px;color:var(--text2)">Presupuesto</div>
            <div class="val" id="res-presupuesto">RD$ 0</div>
        </div>
        <div class="summary-mini">
            <div style="font-size:11px;color:var(--text2)">Restante</div>
            <div class="val" id="res-restante">RD$ 0</div>
        </div>
      </div>
    </div>
    <!-- Gastos -->
    <div class="page" id="page-gastos">
      <div class="page-header"><span class="page-title">Mis Gastos</span></div>
      <div id="gastos-list" style="padding:0 16px"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('resumen',this)">📊 Resumen</button>
    <button class="nav-item" onclick="showPage('gastos',this)">💸 Gastos</button>
  </nav>
  <button class="fab" onclick="openModal('modal-gasto')">＋</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-gasto">
  <div class="modal">
    <div class="form-group">
      <label>Categoría</label>
      <select id="g-cat">
        <option value="casa">🏠 Casa</option>
        <option value="comida">🍔 Comida</option>
        <option value="bancos">🏦 Bancos</option>
        <option value="personas">👤 Personas</option>
        <option value="otros">📦 Otros</option>
      </select>
    </div>
    <input type="text" id="g-desc" placeholder="Descripción" style="margin-bottom:10px">
    <input type="number" id="g-monto" placeholder="Monto" style="margin-bottom:10px">
    <button class="btn-primary" onclick="saveGasto()">Guardar</button>
  </div>
</div>

<script>
let gastos = JSON.parse(localStorage.getItem('mg_gastos')||'[]');
let budget = parseFloat(localStorage.getItem('mg_budget')||'0');

function showPage(name, btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function saveGasto(){
    const desc = document.getElementById('g-desc').value;
    const monto = parseFloat(document.getElementById('g-monto').value);
    const cat = document.getElementById('g-cat').value;
    if(desc && monto){
        gastos.push({desc, monto, cat, id: Date.now()});
        localStorage.setItem('mg_gastos', JSON.stringify(gastos));
        document.getElementById('modal-gasto').classList.remove('open');
        render();
    }
}

function render(){
    const total = gastos.reduce((a,b)=>a+b.monto, 0);
    document.getElementById('res-total').textContent = 'RD$ '+total;
    document.getElementById('res-presupuesto').textContent = 'RD$ '+budget;
    document.getElementById('res-restante').textContent = 'RD$ '+(budget - total);
    
    const list = document.getElementById('gastos-list');
    list.innerHTML = gastos.map(g=>`<div style="padding:10px;background:white;margin-bottom:5px;border-radius:10px">${g.desc} - RD$ ${g.monto} (${g.cat})</div>`).join('');
}

function openModal(id){document.getElementById(id).classList.add('open')}
render();
</script>
</body>
</html>
